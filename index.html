<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>test</title>

  <style>
    @font-face {
      font-family: "FuenteRomantica";
      src: url("fonts/fuente_inicio.ttf") format("truetype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --sky-top: #aee2ff;
      --sky-bottom: #e1f5fe;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #e3f2fd;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .sky-canvas {
      position: absolute;
      inset: 0;
      overflow: hidden;
      isolation: isolate;
      background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-bottom) 100%);
      transition: none;
    }

    .sky-canvas.is-next-scene {
      background: #000;
    }

    .scene-one {
      transition: none;
    }

    .sky-canvas.is-next-scene .scene-one {
      opacity: 0;
      filter: blur(10px);
      pointer-events: none;
    }

    .sun {
      position: absolute;
      top: 8%;
      right: 10%;
      width: clamp(85px, 10vw, 125px);
      height: clamp(85px, 10vw, 125px);
      border-radius: 50%;
      z-index: 2;
      background: radial-gradient(circle at 35% 32%, #fffdf2 0 18%, #fff4d2 42%, #ffd98f 100%);
      box-shadow:
        0 0 45px 18px rgba(255, 244, 210, 0.38),
        0 0 95px 42px rgba(255, 214, 125, 0.22),
        0 0 150px 70px rgba(255, 244, 210, 0.14);
      animation: sunPulse 6s ease-in-out infinite;
      will-change: transform, box-shadow;
      pointer-events: none;
    }

    @keyframes sunPulse {
      0%, 100% {
        transform: scale(1);
        box-shadow:
          0 0 45px 18px rgba(255, 244, 210, 0.38),
          0 0 95px 42px rgba(255, 214, 125, 0.22),
          0 0 150px 70px rgba(255, 244, 210, 0.14);
      }

      50% {
        transform: scale(1.04);
        box-shadow:
          0 0 58px 24px rgba(255, 244, 210, 0.48),
          0 0 118px 52px rgba(255, 214, 125, 0.3),
          0 0 180px 82px rgba(255, 244, 210, 0.2);
      }
    }

    .cloud-field {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .cloud-wrapper {
      position: absolute;
      left: -360px;
      top: var(--top);
      z-index: var(--z);
      opacity: var(--op);
      animation: drift var(--dur) linear var(--delay) 1 forwards;
      will-change: transform;
      pointer-events: none;
    }

    .cloud {
      position: relative;
      width: 120px;
      height: 40px;
      border-radius: 50px;
      background: #fff;
      transform: scale(var(--scale));
    }

    .cloud::before,
    .cloud::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      background: #fff;
    }

    .cloud::before {
      width: 60px;
      height: 60px;
      top: -25px;
      left: 15px;
    }

    .cloud::after {
      width: 40px;
      height: 40px;
      top: -15px;
      right: 15px;
    }

    @keyframes drift {
      from { transform: translate3d(-180px, 0, 0); }
      to { transform: translate3d(calc(100vw + 820px), 0, 0); }
    }

    .city-scene {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .city-layer {
      position: absolute;
      left: 50%;
      bottom: 0;
      width: min(112vw, 1500px);
      height: auto;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .city-back {
      z-index: 10;
      opacity: 0.92;
      transform: translateX(-50%) translate(0px, 10px) scale(1.04);
    }

    .flight-path {
      position: absolute;
      left: 50%;
      top: 50%;
      z-index: 20;
      transform: translate3d(-50%, calc(50vh + 220px), 0);
      will-change: transform;
    }

    .flight-path.is-rising {
      animation: riseUp 8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
    }

    .bobbing-container {
      position: relative;
      animation: floatBob 4s ease-in-out infinite;
      will-change: transform;
    }

    .balloon-cluster {
      position: relative;
      width: 200px;
      height: 250px;
      transform: translateY(-10px) scale(0.85);
      transform-origin: center center;
    }

    @keyframes riseUp {
      from { transform: translate3d(-50%, calc(50vh + 220px), 0); }
      to { transform: translate3d(-50%, -50%, 0); }
    }

    @keyframes floatBob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    .character {
      position: absolute;
      left: 52%;
      top: 220px;
      width: 120px;
      z-index: 50;
      display: block;
      transform: translateX(-50%);
      transform-origin: top center;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
      transition: transform 0.4s ease, opacity 0.3s ease;
    }

    .character:not(.is-falling) {
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.18));
    }

    .character.is-worried-1 {
      transform: translateX(-50%) rotate(0.5deg);
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.18)) saturate(0.9);
    }

    .character.is-worried-2 {
      transform: translateX(-50%) rotate(-0.8deg);
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.18)) saturate(0.8) contrast(1.04);
    }

    .character.is-panic {
      transform: translateX(-50%) rotate(-1deg);
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.18)) saturate(0.7) contrast(1.08);
    }

    .character.is-falling {
      width: 120px;
      filter: none;
      transition: none;
      animation: characterFall 3.2s cubic-bezier(0.35, 0, 0.85, 0.35) forwards;
      will-change: transform;
    }

    @keyframes characterFall {
      0% {
        transform: translateX(-50%) translateY(0) rotate(-6deg);
        opacity: 1;
      }

      100% {
        transform: translateX(-50%) translateY(95vh) rotate(12deg);
        opacity: 0.95;
      }
    }

    .balloon-input {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .balloon {
      position: absolute;
      width: 45px;
      height: 60px;
      border-radius: 50% 50% 50% 50% / 45% 45% 55% 55%;
      background: var(--c);
      box-shadow:
        inset -4px -4px 12px rgba(0, 0, 0, 0.15),
        inset 2px 2px 5px rgba(255, 255, 255, 0.3);
      transform: rotate(var(--r));
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      will-change: transform, opacity, filter;
    }

    .balloon:active {
      filter: brightness(1.2);
    }

    .balloon::before {
      content: "";
      position: absolute;
      bottom: -5px;
      left: 50%;
      width: 0;
      height: 0;
      transform: translateX(-50%);
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-bottom: 8px solid var(--c);
      pointer-events: none;
    }

    .balloon::after {
      content: "";
      position: absolute;
      top: 8px;
      left: 10px;
      width: 10px;
      height: 18px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.5);
      transform: rotate(20deg);
      pointer-events: none;
    }

    .balloon.is-popped {
      animation: popEffect 0.2s forwards;
      pointer-events: none;
    }

    @keyframes popEffect {
      0% {
        transform: scale(1) rotate(var(--r));
        opacity: 1;
        filter: brightness(1);
      }

      50% {
        transform: scale(1.3) rotate(var(--r));
        opacity: 0.8;
        filter: brightness(1.5);
      }

      100% {
        transform: scale(0) rotate(var(--r));
        opacity: 0;
      }
    }

    .strings-svg {
      position: absolute;
      inset: 0 auto auto 0;
      z-index: 30;
      pointer-events: none;
    }

    .strings-svg line {
      stroke: rgba(255, 255, 255, 0.7);
      stroke-width: 1.5;
      transition: opacity 0.2s ease-out;
    }

    .strings-svg line.is-hidden {
      opacity: 0;
    }

    .string-knot {
      position: absolute;
      top: 227px;
      left: 97px;
      width: 6px;
      height: 6px;
      z-index: 35;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.9);
      transition: opacity 0.2s;
      pointer-events: none;
    }

    .string-knot.is-hidden {
      opacity: 0;
    }

    .blackout {
      position: absolute;
      inset: 0;
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
      background: #000;
      opacity: 0;
      pointer-events: none;
    }

    .blackout.is-active {
      animation: fadeToBlack 1.8s ease-in-out forwards;
    }

    .blackout.is-leaving {
      animation: fadeFromBlack 1.8s ease-in-out forwards;
    }

    .blackout-message {
      max-width: min(86vw, 760px);
      color: rgba(255, 255, 255, 0.94);
      font-family: "FuenteRomantica", cursive;
      font-size: clamp(2.2rem, 9vw, 5.8rem);
      line-height: 1.05;
      text-align: center;
      letter-spacing: 0;
      opacity: 0;
      transform: translateY(18px) scale(0.96);
      text-shadow:
        0 0 18px rgba(255, 255, 255, 0.28),
        0 0 36px rgba(255, 210, 230, 0.18);
    }

    .blackout.is-active .blackout-message {
      animation: messageReveal 1.7s ease forwards 1.35s;
    }

    .blackout.is-leaving .blackout-message {
      animation: messageHide 1.2s ease forwards;
    }

    @keyframes fadeToBlack {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes fadeFromBlack {
      from { opacity: 1; }
      to { opacity: 0; }
    }

    @keyframes messageReveal {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes messageHide {
      from {
        opacity: 1;
        transform: translateY(0) scale(1);
      }

      to {
        opacity: 0;
        transform: translateY(-18px) scale(0.96);
      }
    }

    .scene-two {
      position: absolute;
      inset: 0;
      z-index: 1;
      opacity: 0;
      pointer-events: none;
      background: #000;
    }

    .scene-two.is-active {
      opacity: 1;
      pointer-events: auto;
    }

    .scene-two-bg {
      position: absolute;
      inset: 0;
      z-index: 1;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    .scene-two-tree-front {
      position: absolute;
      right: -3vw;
      bottom: 0;
      height: 112vh;
      width: auto;
      z-index: 20;
      filter: brightness(0.88) saturate(0.95);
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .runner {
      position: absolute;
      left: 0;
      top: 66%;
      z-index: 10;
      width: clamp(220px, 42vw, 500px);
      aspect-ratio: 1 / 1;
      transform: translate(-150%, -50%);
      pointer-events: none;
      will-change: transform;
    }

    .runner-sprite {
      width: 100%;
      height: 100%;
      background-image: url("img/novia-run-sprite.png");
      background-repeat: no-repeat;
      background-size: 700% 700%;
      background-position: 0% 0%;
      image-rendering: auto;
    }

    .runner.is-left .runner-sprite {
      transform: scaleX(-1);
    }

    .runner.is-near {
      z-index: 12;
    }

    .runner.is-far {
      z-index: 8;
      filter: brightness(0.92) saturate(0.9);
    }

    .runner.run-left-to-right {
      animation: runLeftToRight 6.5s linear forwards;
    }

    .runner.run-right-to-left {
      animation: runRightToLeft 7.4s linear forwards;
    }

    @keyframes runLeftToRight {
      from {
        top: 78%;
        transform: translate(-150%, -50%) scale(1.2);
      }

      to {
        top: 78%;
        transform: translate(115vw, -50%) scale(1.2);
      }
    }

    @keyframes runRightToLeft {
      from {
        top: 46%;
        transform: translate(115vw, -50%) scale(0.5);
      }

      to {
        top: 46%;
        transform: translate(-150%, -50%) scale(0.5);
      }
    }

    .tree-character {
      position: absolute;
      right: -90vw;
      bottom: -20vh;
      z-index: 30;
      width: clamp(800px, 100vw, 1060px);
      opacity: 0;
      transform: translateX(28px) scale(0.96);
      transition:
        opacity 0.9s ease,
        transform 0.9s ease;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .tree-character.is-visible {
      opacity: 1;
      transform: translateX(0) scale(1);
    }

    .thought-bubble {
      position: absolute;
      left: 50%;
      bottom: 50vh;
      z-index: 35;
      width: clamp(285px, 46vw, 520px);
      aspect-ratio: 1.58 / 1;
      opacity: 0;
      transform: translate(-50%, 16px) scale(0.82);
      transition:
        opacity 0.55s ease,
        transform 0.72s cubic-bezier(0.2, 1.35, 0.4, 1);
      pointer-events: none;
      user-select: none;
      filter: drop-shadow(0 5px 7px rgba(0, 0, 0, 0.14));
    }

    .thought-bubble.is-visible {
      opacity: 1;
      transform: translate(-50%, 0) scale(1);
      animation: thoughtFloat 3.2s ease-in-out infinite 0.8s;
    }

    .thought-cloud-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .thought-cloud-fill {
      fill: #fff;
    }

    .thought-cloud-line {
      fill: none;
      stroke: #111;
      stroke-width: 6.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .thought-cloud-line.is-soft {
      stroke-width: 3.2;
      opacity: 0.72;
    }

    .thought-bubble-inner {
      position: absolute;
      left: 13%;
      top: 23%;
      z-index: 2;
      width: 74%;
      height: 48%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #111;
      font-size: clamp(0.9rem, 2vw, 1.32rem);
      line-height: 1.1;
      text-align: center;
      font-weight: 700;
    }

    .thought-dot {
      position: absolute;
      border: 4px solid #111;
      border-radius: 50%;
      background: #fff;
      z-index: 2;
      box-shadow:
        1px 0 0 #111,
        -1px 1px 0 rgba(0, 0, 0, 0.32);
    }

    .thought-dot-one {
      width: clamp(24px, 3.8vw, 42px);
      height: clamp(24px, 3.8vw, 42px);
      right: 12%;
      bottom: -12%;
    }

    .thought-dot-two {
      width: clamp(17px, 2.7vw, 29px);
      height: clamp(17px, 2.7vw, 29px);
      right: 7%;
      bottom: -24%;
    }

    .thought-dot-three {
      width: clamp(10px, 1.7vw, 18px);
      height: clamp(10px, 1.7vw, 18px);
      right: 3.5%;
      bottom: -35%;
    }

    @keyframes thoughtFloat {
      0%, 100% {
        transform: translate(-50%, 0) scale(1);
      }

      50% {
        transform: translate(-50%, -5px) scale(1.01);
      }
    }

    @media (max-width: 700px) {
      .scene-two-bg {
        object-position: 42% center;
      }

      .scene-two-tree-front {
        right: -65vw;
        height: 105vh;
      }

      .runner {
        width: clamp(180px, 78vw, 360px);
      }

      .thought-bubble {
        left: 50%;
        bottom: 54vh;
        width: clamp(285px, 90vw, 430px);
      }

      .thought-cloud-line {
        stroke-width: 6;
      }

      .thought-cloud-line.is-soft {
        stroke-width: 2.8;
      }

      .thought-dot-one {
        right: 11%;
        bottom: -11%;
      }

      .thought-dot-two {
        right: 6.5%;
        bottom: -22%;
      }

      .thought-dot-three {
        right: 3.2%;
        bottom: -32%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .sun,
      .cloud-wrapper,
      .bobbing-container,
      .flight-path,
      .balloon.is-popped,
      .character.is-falling,
      .blackout,
      .blackout-message,
      .runner,
      .thought-bubble {
        animation: none !important;
      }
    }

    .loader {
      position: fixed;
      inset: 0;
      z-index: 5000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      background: #000;
      color: #fff;
      opacity: 1;
      visibility: visible;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }

    .loader.is-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loader-heart {
      color: #ff4f8b;
      font-size: clamp(3.4rem, 18vw, 8rem);
      line-height: 1;
      text-shadow:
        0 0 18px rgba(255, 79, 139, 0.8),
        0 0 44px rgba(255, 79, 139, 0.35);
      animation: heartBeat 1.1s ease-in-out infinite;
    }

    .loader-percent {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: clamp(1.1rem, 5vw, 2rem);
      font-weight: 600;
      letter-spacing: 0.04em;
      color: rgba(255, 255, 255, 0.88);
    }

    @keyframes heartBeat {
      0%, 100% {
        transform: scale(1);
        filter: brightness(1);
      }

      35% {
        transform: scale(1.18);
        filter: brightness(1.18);
      }

      58% {
        transform: scale(0.96);
        filter: brightness(0.96);
      }
    }
  </style>
</head>

<body>
  <div id="loader" class="loader" aria-live="polite">
    <div class="loader-heart" aria-hidden="true">❤</div>
    <div id="loaderPercent" class="loader-percent">0%</div>
  </div>

  <main class="sky-canvas">
    <div class="sun scene-one"></div>
    <div id="cloudField" class="cloud-field scene-one" aria-hidden="true"></div>

    <div class="city-scene scene-one" aria-hidden="true">
      <img class="city-layer city-back" src="img/ciudad-delantera.png" alt="">
    </div>

    <section id="flightPath" class="flight-path scene-one" aria-label="Globos interactivos">
      <div class="bobbing-container">
        <div id="balloonCluster" class="balloon-cluster">
          <svg id="stringsSvg" class="strings-svg" width="200" height="250" aria-hidden="true"></svg>
          <img id="character" class="character" alt="" />
          <div id="stringKnot" class="string-knot"></div>
        </div>
      </div>
    </section>

    <div id="blackout" class="blackout" aria-hidden="true">
      <p class="blackout-message">Y entonces empezó nuestra historia...</p>
    </div>

    <section id="sceneTwo" class="scene-two" aria-hidden="true">
      <img class="scene-two-bg" src="img/escena2-fondo.png" alt="">

      <div id="runner" class="runner" aria-hidden="true">
        <div id="runnerSprite" class="runner-sprite"></div>
      </div>

      <img id="treeCharacter" class="tree-character" src="img/personaje-arbol.png" alt="">

      <div id="thoughtBubble" class="thought-bubble" aria-hidden="true">
        <svg class="thought-cloud-svg" viewBox="0 0 520 330" aria-hidden="true">
          <path
            class="thought-cloud-fill"
            d="M112 225
               C66 224 36 194 42 155
               C47 120 81 96 119 103
               C126 67 162 46 197 55
               C219 28 263 24 291 50
               C318 33 358 42 378 72
               C415 68 450 92 456 127
               C489 136 503 176 481 205
               C498 240 467 276 429 269
               C407 299 362 294 345 264
               C319 294 269 291 250 260
               C219 289 168 275 163 236
               C147 229 130 226 112 225 Z"
          />
          <path
            class="thought-cloud-line"
            d="M113 223
               C65 224 35 194 42 154
               C49 114 85 94 119 103
               C124 67 161 45 198 55
               C220 28 265 24 292 51
               C321 31 359 44 379 73
               C416 68 452 93 456 129
               C489 136 503 178 480 207
               C497 239 466 276 429 268
               C406 299 361 294 345 264
               C318 294 269 291 250 260
               C219 289 168 275 163 236
               C148 229 130 225

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>test</title>

  <style>
    @font-face {
      font-family: "FuenteRomantica";
      src: url("fonts/fuente_inicio.ttf") format("truetype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --sky-top: #aee2ff;
      --sky-bottom: #e1f5fe;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #e3f2fd;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .sky-canvas {
      position: absolute;
      inset: 0;
      overflow: hidden;
      isolation: isolate;
      background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-bottom) 100%);
      transition: none;
    }

    .sky-canvas.is-next-scene {
      background: #000;
    }

    .scene-one {
      transition: none;
    }

    .sky-canvas.is-next-scene .scene-one {
      opacity: 0;
      filter: blur(10px);
      pointer-events: none;
    }

    .sun {
      position: absolute;
      top: 8%;
      right: 10%;
      width: clamp(85px, 10vw, 125px);
      height: clamp(85px, 10vw, 125px);
      border-radius: 50%;
      z-index: 2;
      background: radial-gradient(circle at 35% 32%, #fffdf2 0 18%, #fff4d2 42%, #ffd98f 100%);
      box-shadow:
        0 0 45px 18px rgba(255, 244, 210, 0.38),
        0 0 95px 42px rgba(255, 214, 125, 0.22),
        0 0 150px 70px rgba(255, 244, 210, 0.14);
      animation: sunPulse 6s ease-in-out infinite;
      will-change: transform, box-shadow;
      pointer-events: none;
    }

    @keyframes sunPulse {
      0%, 100% {
        transform: scale(1);
        box-shadow:
          0 0 45px 18px rgba(255, 244, 210, 0.38),
          0 0 95px 42px rgba(255, 214, 125, 0.22),
          0 0 150px 70px rgba(255, 244, 210, 0.14);
      }

      50% {
        transform: scale(1.04);
        box-shadow:
          0 0 58px 24px rgba(255, 244, 210, 0.48),
          0 0 118px 52px rgba(255, 214, 125, 0.3),
          0 0 180px 82px rgba(255, 244, 210, 0.2);
      }
    }

    .cloud-field {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .cloud-wrapper {
      position: absolute;
      left: -360px;
      top: var(--top);
      z-index: var(--z);
      opacity: var(--op);
      animation: drift var(--dur) linear var(--delay) 1 forwards;
      will-change: transform;
      pointer-events: none;
    }

    .cloud {
      position: relative;
      width: 120px;
      height: 40px;
      border-radius: 50px;
      background: #fff;
      transform: scale(var(--scale));
    }

    .cloud::before,
    .cloud::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      background: #fff;
    }

    .cloud::before {
      width: 60px;
      height: 60px;
      top: -25px;
      left: 15px;
    }

    .cloud::after {
      width: 40px;
      height: 40px;
      top: -15px;
      right: 15px;
    }

    @keyframes drift {
      from { transform: translate3d(-180px, 0, 0); }
      to { transform: translate3d(calc(100vw + 820px), 0, 0); }
    }

    .city-scene {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .city-layer {
      position: absolute;
      left: 50%;
      bottom: 0;
      width: min(112vw, 1500px);
      height: auto;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .city-back {
      z-index: 10;
      opacity: 0.92;
      transform: translateX(-50%) translate(0px, 10px) scale(1.04);
    }

    .flight-path {
      position: absolute;
      left: 50%;
      top: 50%;
      z-index: 20;
      transform: translate3d(-50%, calc(50vh + 220px), 0);
      will-change: transform;
    }

    .flight-path.is-rising {
      animation: riseUp 8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
    }

    .bobbing-container {
      position: relative;
      animation: floatBob 4s ease-in-out infinite;
      will-change: transform;
    }

    .balloon-cluster {
      position: relative;
      width: 200px;
      height: 250px;
      transform: translateY(-10px) scale(0.85);
      transform-origin: center center;
    }

    @keyframes riseUp {
      from { transform: translate3d(-50%, calc(50vh + 220px), 0); }
      to { transform: translate3d(-50%, -50%, 0); }
    }

    @keyframes floatBob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    .character {
      position: absolute;
      left: 52%;
      top: 220px;
      width: 120px;
      z-index: 50;
      display: block;
      transform: translateX(-50%);
      transform-origin: top center;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
      transition: transform 0.4s ease, opacity 0.3s ease;
    }

    .character:not(.is-falling) {
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.18));
    }

    .character.is-worried-1 {
      transform: translateX(-50%) rotate(0.5deg);
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.18)) saturate(0.9);
    }

    .character.is-worried-2 {
      transform: translateX(-50%) rotate(-0.8deg);
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.18)) saturate(0.8) contrast(1.04);
    }

    .character.is-panic {
      transform: translateX(-50%) rotate(-1deg);
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.18)) saturate(0.7) contrast(1.08);
    }

    .character.is-falling {
      width: 120px;
      filter: none;
      transition: none;
      animation: characterFall 3.2s cubic-bezier(0.35, 0, 0.85, 0.35) forwards;
      will-change: transform;
    }

    @keyframes characterFall {
      0% {
        transform: translateX(-50%) translateY(0) rotate(-6deg);
        opacity: 1;
      }

      100% {
        transform: translateX(-50%) translateY(95vh) rotate(12deg);
        opacity: 0.95;
      }
    }

    .balloon-input {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .balloon {
      position: absolute;
      width: 45px;
      height: 60px;
      border-radius: 50% 50% 50% 50% / 45% 45% 55% 55%;
      background: var(--c);
      box-shadow:
        inset -4px -4px 12px rgba(0, 0, 0, 0.15),
        inset 2px 2px 5px rgba(255, 255, 255, 0.3);
      transform: rotate(var(--r));
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      will-change: transform, opacity, filter;
    }

    .balloon:active {
      filter: brightness(1.2);
    }

    .balloon::before {
      content: "";
      position: absolute;
      bottom: -5px;
      left: 50%;
      width: 0;
      height: 0;
      transform: translateX(-50%);
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-bottom: 8px solid var(--c);
      pointer-events: none;
    }

    .balloon::after {
      content: "";
      position: absolute;
      top: 8px;
      left: 10px;
      width: 10px;
      height: 18px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.5);
      transform: rotate(20deg);
      pointer-events: none;
    }

    .balloon.is-popped {
      animation: popEffect 0.2s forwards;
      pointer-events: none;
    }

    @keyframes popEffect {
      0% {
        transform: scale(1) rotate(var(--r));
        opacity: 1;
        filter: brightness(1);
      }

      50% {
        transform: scale(1.3) rotate(var(--r));
        opacity: 0.8;
        filter: brightness(1.5);
      }

      100% {
        transform: scale(0) rotate(var(--r));
        opacity: 0;
      }
    }

    .strings-svg {
      position: absolute;
      inset: 0 auto auto 0;
      z-index: 30;
      pointer-events: none;
    }

    .strings-svg line {
      stroke: rgba(255, 255, 255, 0.7);
      stroke-width: 1.5;
      transition: opacity 0.2s ease-out;
    }

    .strings-svg line.is-hidden {
      opacity: 0;
    }

    .string-knot {
      position: absolute;
      top: 227px;
      left: 97px;
      width: 6px;
      height: 6px;
      z-index: 35;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.9);
      transition: opacity 0.2s;
      pointer-events: none;
    }

    .string-knot.is-hidden {
      opacity: 0;
    }

    .blackout {
      position: absolute;
      inset: 0;
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
      background: #000;
      opacity: 0;
      pointer-events: none;
    }

    .blackout.is-active {
      animation: fadeToBlack 1.8s ease-in-out forwards;
      pointer-events: auto;
    }

    .blackout.is-leaving {
      animation: fadeFromBlack 1.8s ease-in-out forwards;
    }

    .blackout-message {
      max-width: min(86vw, 760px);
      color: rgba(255, 255, 255, 0.94);
      font-family: "FuenteRomantica", cursive;
      font-size: clamp(2.2rem, 9vw, 5.8rem);
      line-height: 1.05;
      text-align: center;
      letter-spacing: 0;
      opacity: 0;
      transform: translateY(18px) scale(0.96);
      text-shadow:
        0 0 18px rgba(255, 255, 255, 0.28),
        0 0 36px rgba(255, 210, 230, 0.18);
    }

    .blackout.is-active .blackout-message {
      animation: messageReveal 1.7s ease forwards 1.35s;
    }

    .blackout.is-leaving .blackout-message {
      animation: messageHide 1.2s ease forwards;
    }

    @keyframes fadeToBlack {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes fadeFromBlack {
      from { opacity: 1; }
      to { opacity: 0; }
    }

    @keyframes messageReveal {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes messageHide {
      from {
        opacity: 1;
        transform: translateY(0) scale(1);
      }

      to {
        opacity: 0;
        transform: translateY(-18px) scale(0.96);
      }
    }

    .scene-two {
      position: absolute;
      inset: 0;
      z-index: 1;
      opacity: 0;
      pointer-events: none;
      background: #000;
    }

    .scene-two.is-active {
      opacity: 1;
      pointer-events: auto;
    }

    .scene-three {
      position: absolute;
      inset: 0;
      z-index: 1;
      opacity: 0;
      pointer-events: none;
      background: #000;
      transition: opacity 1.3s ease-in-out;
      overflow: hidden;
    }

    .scene-three.is-active {
      opacity: 1;
      pointer-events: auto;
    }

    .scene-two-bg {
      position: absolute;
      inset: 0;
      z-index: 1;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    .scene-two-tree-front {
      position: absolute;
      right: -3vw;
      bottom: 0;
      height: 112vh;
      width: auto;
      z-index: 20;
      filter: brightness(0.88) saturate(0.95);
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .runner {
      position: absolute;
      left: 0;
      top: 66%;
      z-index: 10;
      width: clamp(220px, 42vw, 500px);
      aspect-ratio: 1 / 1;
      transform: translate(-150%, -50%);
      pointer-events: none;
      will-change: transform;
    }

    .runner-sprite {
      width: 100%;
      height: 100%;
      background-image: url("img/novia-run-sprite.png");
      background-repeat: no-repeat;
      background-size: 700% 700%;
      background-position: 0% 0%;
      image-rendering: auto;
    }

    .runner.is-left .runner-sprite {
      transform: scaleX(-1);
    }

    .runner.is-near {
      z-index: 12;
    }

    .runner.is-far {
      z-index: 8;
      filter: brightness(0.92) saturate(0.9);
    }

    .runner.run-left-to-right {
      animation: runLeftToRight 6.5s linear forwards;
    }

    .runner.run-right-to-left {
      animation: runRightToLeft 7.4s linear forwards;
    }

    @keyframes runLeftToRight {
      from {
        top: 78%;
        transform: translate(-150%, -50%) scale(1.2);
      }

      to {
        top: 78%;
        transform: translate(115vw, -50%) scale(1.2);
      }
    }

    @keyframes runRightToLeft {
      from {
        top: 46%;
        transform: translate(115vw, -50%) scale(0.5);
      }

      to {
        top: 46%;
        transform: translate(-150%, -50%) scale(0.5);
      }
    }

    .tree-character {
      position: absolute;
      right: -90vw;
      bottom: -20vh;
      z-index: 30;
      width: clamp(800px, 100vw, 1060px);
      opacity: 0;
      transform: translateX(28px) scale(0.96);
      transition:
        opacity 0.9s ease,
        transform 0.9s ease;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .tree-character.is-visible {
      opacity: 1;
      transform: translateX(0) scale(1);
    }

    .thought-bubble {
      position: absolute;
      left: 50%;
      bottom: 39vh;
      z-index: 35;
      width: clamp(285px, 46vw, 520px);
      aspect-ratio: 1.58 / 1;
      opacity: 0;
      transform: translate(-50%, 30px) scale(0.78);
      transition:
        opacity 0.85s ease-out,
        transform 0.95s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none;
      user-select: none;
    }

    .thought-bubble.is-visible {
      opacity: 1;
      transform: translate(-50%, 0) scale(1);
    }

    .thought-cloud-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .thought-cloud-fill {
      fill: #fff;
    }

    .thought-cloud-line {
      fill: none;
      stroke: #111;
      stroke-width: 7;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .thought-puff {
      position: absolute;
      background: #fff;
      border: 4px solid #111;
      z-index: 2;
      box-shadow: 1px 1px 0 rgba(0, 0, 0, 0.18);
    }

    .thought-puff-one {
      width: clamp(30px, 4.5vw, 48px);
      height: clamp(23px, 3.7vw, 38px);
      right: 30%;
      bottom: 10%;
      border-radius: 58% 42% 52% 48% / 48% 58% 42% 52%;
      transform: rotate(4deg);
    }

    .thought-puff-two {
      width: clamp(22px, 3.4vw, 36px);
      height: clamp(18px, 2.8vw, 29px);
      right: 12.5%;
      bottom: 10%;
      border-radius: 46% 54% 58% 42% / 56% 44% 50% 50%;
      transform: rotate(-8deg);
    }

    .thought-puff-three {
      width: clamp(13px, 2.2vw, 22px);
      height: clamp(10px, 1.7vw, 18px);
      right: 8.5%;
      bottom: 10%;
      border-radius: 55% 45% 50% 50% / 44% 58% 42% 56%;
      transform: rotate(9deg);
    }

    .thought-story {
      position: absolute;
      left: 16%;
      top: 23%;
      z-index: 3;
      width: 68%;
      height: 54%;
      opacity: 0;
      transform: scale(0.96);
      transition:
        opacity 0.45s ease,
        transform 0.45s ease;
    }

    .thought-bubble.is-visible .thought-story {
      opacity: 1;
      transform: scale(1);
    }

    .stick-story {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .stick-story line,
    .stick-story path,
    .stick-story circle {
      fill: none;
      stroke: #111;
      stroke-width: 5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .story-scene {
      opacity: 1;
      transform-box: fill-box;
      transform-origin: center;
    }

    .boy-hair,
    .girl-hair {
      stroke-width: 4;
    }

    .kiss-heart {
      fill: #ff2a2a !important;
      stroke: #111;
      stroke-width: 4;
    }

    .stick-dress,
    .stick-shorts,
    .stick-bow {
      fill: #fff !important;
    }

    .stick-eye {
      fill: #111 !important;
      stroke: none !important;
    }

    .stick-smile {
      stroke-width: 2.5 !important;
      fill: none !important;
    }

    .label-text {
      font-family: "FuenteRomantica", "Comic Sans MS", cursive, sans-serif;
      font-size: 19px;
      font-weight: bold;
      fill: #111 !important;
      stroke: none !important;
      text-anchor: middle;
    }

    .label-arrow {
      fill: none !important;
      stroke: #111 !important;
      stroke-width: 3.5 !important;
      stroke-linecap: round;
      stroke-linejoin: round;
    }



    .thought-bubble.is-visible .label-juan {
      animation: labelPop 6s ease-in-out infinite;
      transform-origin: 75px 125px;
    }

    .thought-bubble.is-visible .label-fer {
      animation: labelPop 6s ease-in-out infinite;
      transform-origin: 245px 125px;
    }

    @keyframes labelPop {
      0%, 30% {
        opacity: 0;
        transform: scale(0);
      }

      38% {
        opacity: 1;
        transform: scale(1.1);
      }

      43%, 62% {
        opacity: 1;
        transform: scale(1);
      }

      70% {
        opacity: 0;
        transform: scale(0);
      }

      100% {
        opacity: 0;
        transform: scale(0);
      }
    }

    .thought-bubble.is-visible .stick-boy {
      animation: boyApproach 6s ease-in-out infinite;
    }

    .thought-bubble.is-visible .stick-girl {
      animation: girlApproach 6s ease-in-out infinite;
    }

    .thought-bubble.is-visible .heart-1 {
      animation: heartPop1 6s ease-in-out infinite;
      transform-origin: 167px 50px;
    }

    .thought-bubble.is-visible .heart-2 {
      animation: heartPop2 6s ease-in-out infinite;
      transform-origin: 167px 50px;
    }

    .thought-bubble.is-visible .heart-3 {
      animation: heartPop3 6s ease-in-out infinite;
      transform-origin: 167px 50px;
    }

    @keyframes boyApproach {
      0% {
        transform: translateX(-34px);
      }

      30%, 70% {
        transform: translateX(14px);
      }

      100% {
        transform: translateX(-34px);
      }
    }

    @keyframes girlApproach {
      0% {
        transform: translateX(34px);
      }

      30%, 70% {
        transform: translateX(-14px);
      }

      100% {
        transform: translateX(34px);
      }
    }

    @keyframes heartPop1 {
      0%, 30% {
        opacity: 0;
        transform: scale(0) translate(0, 0) rotate(0deg);
      }
      38% {
        opacity: 1;
        transform: scale(0.65) translate(-14px, -18px) rotate(-15deg);
      }
      55% {
        opacity: 0.9;
        transform: scale(0.6) translate(-24px, -36px) rotate(-22deg);
      }
      65% {
        opacity: 0;
        transform: scale(0.2) translate(-32px, -52px) rotate(-30deg);
      }
      100% {
        opacity: 0;
        transform: scale(0) translate(0, 0) rotate(0deg);
      }
    }

    @keyframes heartPop2 {
      0%, 33% {
        opacity: 0;
        transform: scale(0) translate(0, 0) rotate(0deg);
      }
      41% {
        opacity: 1;
        transform: scale(0.95) translate(4px, -22px) rotate(5deg);
      }
      58% {
        opacity: 1;
        transform: scale(0.85) translate(8px, -48px) rotate(12deg);
      }
      67% {
        opacity: 0;
        transform: scale(0.3) translate(12px, -68px) rotate(18deg);
      }
      100% {
        opacity: 0;
        transform: scale(0) translate(0, 0) rotate(0deg);
      }
    }

    @keyframes heartPop3 {
      0%, 36% {
        opacity: 0;
        transform: scale(0) translate(0, 0) rotate(0deg);
      }
      44% {
        opacity: 1;
        transform: scale(0.55) translate(16px, -12px) rotate(20deg);
      }
      59% {
        opacity: 0.9;
        transform: scale(0.5) translate(28px, -28px) rotate(32deg);
      }
      68% {
        opacity: 0;
        transform: scale(0.15) translate(36px, -42px) rotate(40deg);
      }
      100% {
        opacity: 0;
        transform: scale(0) translate(0, 0) rotate(0deg);
      }
    }

    @keyframes thoughtFloatBreathing {
      0% {
        transform: translateY(0) scale(1, 1) rotate(0deg);
      }
      25% {
        transform: translateY(-9px) scale(1.025, 0.98) rotate(0.4deg);
      }
      50% {
        transform: translateY(-2px) scale(0.98, 1.02) rotate(-0.3deg);
      }
      75% {
        transform: translateY(-12px) scale(1.018, 0.982) rotate(0.5deg);
      }
      100% {
        transform: translateY(0) scale(1, 1) rotate(0deg);
      }
    }

    .thought-bubble-hover-wrapper {
      width: 100%;
      height: 100%;
      transition: transform 0.45s cubic-bezier(0.25, 1, 0.5, 1), filter 0.45s ease;
      filter: drop-shadow(0 6px 12px rgba(0, 0, 0, 0.12));
    }

    .thought-bubble.is-visible .thought-bubble-hover-wrapper {
      pointer-events: auto !important;
      cursor: pointer !important;
    }

    .thought-bubble.is-visible:hover .thought-bubble-hover-wrapper {
      transform: translateY(-6px) scale(1.045);
      filter: drop-shadow(0 16px 32px rgba(255, 79, 139, 0.38));
    }

    .thought-bubble-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transform-origin: center center;
    }

    .thought-bubble.is-visible .thought-bubble-inner {
      animation: thoughtFloatBreathing 6.5s ease-in-out infinite 0.2s;
    }

    /* Redefine is-visible to make thought bubble interactive and glowing on hover */
    .thought-bubble.is-visible {
      opacity: 1;
      transform: translate(-50%, 0) scale(1);
      pointer-events: auto !important;
      cursor: pointer !important;
    }

    /* Independent organic puff breathing animations */
    @keyframes puffFloatOne {
      0%, 100% {
        transform: rotate(4deg) scale(1) translate(0, 0);
      }
      50% {
        transform: rotate(8deg) scale(1.08) translate(-1px, -2px);
      }
    }

    @keyframes puffFloatTwo {
      0%, 100% {
        transform: rotate(-8deg) scale(1) translate(0, 0);
      }
      50% {
        transform: rotate(-4deg) scale(1.11) translate(1.5px, -1.5px);
      }
    }

    @keyframes puffFloatThree {
      0%, 100% {
        transform: rotate(9deg) scale(1) translate(0, 0);
      }
      50% {
        transform: rotate(14deg) scale(1.15) translate(-1px, 2px);
      }
    }

    .thought-bubble.is-visible .thought-puff-one {
      animation: puffFloatOne 4.5s ease-in-out infinite alternate;
    }
    
    .thought-bubble.is-visible .thought-puff-two {
      animation: puffFloatTwo 3.8s ease-in-out infinite alternate 0.3s;
    }

    .thought-bubble.is-visible .thought-puff-three {
      animation: puffFloatThree 3.2s ease-in-out infinite alternate 0.6s;
    }

    .thought-bubble.is-popped {
      animation: smokeDissolveContainer 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards !important;
      pointer-events: none !important;
    }

    .thought-bubble.is-popped .thought-puff-one {
      animation: puffSmokeOne 1.2s ease-out forwards !important;
    }

    .thought-bubble.is-popped .thought-puff-two {
      animation: puffSmokeTwo 1.25s ease-out forwards !important;
    }

    .thought-bubble.is-popped .thought-puff-three {
      animation: puffSmokeThree 1.3s ease-out forwards !important;
    }

    .thought-bubble.is-popped .thought-story,
    .thought-bubble.is-popped .thought-cloud-fill,
    .thought-bubble.is-popped .thought-cloud-line {
      transition: opacity 0.5s ease, filter 0.5s ease;
      opacity: 0 !important;
      filter: blur(8px) !important;
    }

    @keyframes smokeDissolveContainer {
      0% {
        transform: translate(-50%, 0) scale(1) rotate(0deg);
        filter: blur(0px);
        opacity: 1;
      }
      20% {
        transform: translate(-50%, -15px) scale(1.06) rotate(1deg);
        filter: blur(1px);
        opacity: 0.95;
      }
      45% {
        transform: translate(-47%, -45px) scale(1.2) rotate(-2deg);
        filter: blur(4px);
        opacity: 0.65;
      }
      85% {
        transform: translate(-53%, -85px) scale(1.35) rotate(3deg);
        filter: blur(12px);
        opacity: 0.2;
      }
      100% {
        transform: translate(-50%, -115px) scale(1.53) rotate(5deg);
        filter: blur(28px);
        opacity: 0;
      }
    }

    @keyframes puffSmokeOne {
      0% {
        transform: translate(0, 0) scale(1);
        filter: blur(0px);
        opacity: 1;
      }
      100% {
        transform: translate(25px, 20px) scale(1.6);
        filter: blur(12px);
        opacity: 0;
      }
    }

    @keyframes puffSmokeTwo {
      0% {
        transform: translate(0, 0) scale(1);
        filter: blur(0px);
        opacity: 1;
      }
      100% {
        transform: translate(15px, 35px) scale(1.7);
        filter: blur(10px);
        opacity: 0;
      }
    }

    @keyframes puffSmokeThree {
      0% {
        transform: translate(0, 0) scale(1);
        filter: blur(0px);
        opacity: 1;
      }
      100% {
        transform: translate(5px, 50px) scale(1.8);
        filter: blur(8px);
        opacity: 0;
      }
    }

    .smoke-particle {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.85) 0%, rgba(240, 240, 243, 0.4) 55%, rgba(255, 255, 255, 0) 70%);
      border-radius: 50%;
      filter: blur(2px);
      animation: smokeFloatUp var(--duration) cubic-bezier(0.16, 1, 0.3, 1) forwards;
      user-select: none;
    }

    @keyframes smokeFloatUp {
      0% {
        transform: translate(-50%, -50%) scale(0.3) rotate(0deg);
        opacity: 0;
      }
      12% {
        opacity: var(--max-opacity);
      }
      100% {
        transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(var(--scale-end)) rotate(var(--rot-end));
        opacity: 0;
        filter: blur(16px);
      }
    }

    /* Heart & Star particles floating animation */
    .heart-particle {
      position: fixed;
      font-size: clamp(18px, 4vw, 24px);
      pointer-events: none;
      z-index: 10000;
      animation: particleFloatUp 1.4s cubic-bezier(0.25, 1, 0.5, 1) forwards;
      user-select: none;
    }

    @keyframes particleFloatUp {
      0% {
        transform: translate(-50%, -50%) scale(0) rotate(0deg);
        opacity: 0;
      }
      15% {
        transform: translate(-50%, -50%) scale(var(--scale-max)) rotate(var(--rot-start));
        opacity: 0.95;
      }
      100% {
        transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(0.25) rotate(var(--rot-end));
        opacity: 0;
      }
    }

    .btn-reset {
      background: linear-gradient(135deg, #ff4f8b 0%, #ff758f 100%);
      color: white;
      border: none;
      padding: 11px 28px;
      font-size: 0.95rem;
      font-weight: bold;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(255, 79, 139, 0.35);
      transition: all 0.3s ease;
    }

    .btn-reset:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 20px rgba(255, 79, 139, 0.55);
    }

    @media (max-width: 700px) {
      .scene-two-bg {
        object-position: 42% center;
      }

      .scene-two-tree-front {
        right: -65vw;
        height: 105vh;
      }

      .runner {
        width: clamp(180px, 78vw, 360px);
      }

      .thought-bubble {
        left: 50%;
        bottom: 40%;
        width: clamp(285px, 90vw, 430px);
      }

      .thought-cloud-line {
        stroke-width: 6.5;
      }

      .thought-puff-one {
        right: 30%
        bottom: 30%;
      }

      .thought-puff-two {
        right: 25%;
        bottom: 28%;
      }

      .thought-puff-three {
        right: 20%;
        bottom: 26%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .sun,
      .cloud-wrapper,
      .bobbing-container,
      .flight-path,
      .balloon.is-popped,
      .character.is-falling,
      .blackout,
      .blackout-message,
      .runner,
      .thought-bubble,
      .star-back,
      .star-halo,
      .shooting-star {
        animation: none !important;
      }
    }

    .loader {
      position: fixed;
      inset: 0;
      z-index: 5000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      background: #000;
      color: #fff;
      opacity: 1;
      visibility: visible;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }

    .loader.is-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loader-heart {
      color: #ff4f8b;
      font-size: clamp(3.4rem, 18vw, 8rem);
      line-height: 1;
      text-shadow:
        0 0 18px rgba(255, 79, 139, 0.8),
        0 0 44px rgba(255, 79, 139, 0.35);
      animation: heartBeat 1.1s ease-in-out infinite;
    }

    .loader-percent {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: clamp(1.1rem, 5vw, 2rem);
      font-weight: 600;
      letter-spacing: 0.04em;
      color: rgba(255, 255, 255, 0.88);
    }

    @keyframes heartBeat {
      0%, 100% {
        transform: scale(1);
        filter: brightness(1);
      }

      35% {
        transform: scale(1.18);
        filter: brightness(1.18);
      }

      58% {
        transform: scale(0.96);
      }
    }
  </style>
</head>

<body>

  <script>
    const SCENE_ONE_START_DELAY = 900;
    const CLOUD_COUNT = 25;
    const RUNNER_FRAME_COUNT = 49;
    const RUNNER_COLUMNS = 7;
    const RUNNER_FRAME_DURATION = 60;

    const treeCharacter = document.getElementById("treeCharacter");
    const thoughtBubble = document.getElementById("thoughtBubble");

    let runnerLaps = 0;
    let treeCharacterShown = false;
    let thoughtBubbleShown = false;

    const characterStates = [
      "img/personaje-normal.png",
      "img/personaje-preocupado-1.png",
      "img/personaje-preocupado-2.png",
      "img/personaje-panico.png",
      "img/personaje-cayendo.png"
    ];

    const assetsToLoad = [
      ...characterStates,
      "img/novia-run-sprite.png",
      "img/escena2-fondo.png",
      "img/escena2-arbol-frente.png",
      "img/ciudad-delantera.png",
      "img/personaje-arbol.png"
    ];

    const balloons = [
      { color: "#FF4081", top: 0, left: 77.5, rotate: "0deg", z: 1, string: [100, 58] },
      { color: "#4FC3F7", top: 10, left: 40, rotate: "-5deg", z: 2, string: [63, 68] },
      { color: "#FFD54F", top: 10, left: 115, rotate: "5deg", z: 2, string: [138, 68] },
      { color: "#BA68C8", top: 25, left: 10, rotate: "-10deg", z: 3, string: [33, 83] },
      { color: "#FF8A65", top: 25, left: 145, rotate: "10deg", z: 3, string: [168, 83] },
      { color: "#F06292", top: 35, left: 60, rotate: "-3deg", z: 4, string: [83, 93] },
      { color: "#B5EAD7", top: 35, left: 95, rotate: "3deg", z: 4, string: [118, 93] },
      { color: "#C7CEEA", top: 45, left: 30, rotate: "-8deg", z: 5, string: [53, 103] },
      { color: "#FFF4D2", top: 45, left: 125, rotate: "8deg", z: 5, string: [148, 103] },
      { color: "#FFB7B2", top: 55, left: 0, rotate: "-15deg", z: 6, string: [23, 113] },
      { color: "#E2F0CB", top: 55, left: 155, rotate: "15deg", z: 6, string: [178, 113] },
      { color: "#81C784", top: 60, left: 77.5, rotate: "0deg", z: 7, string: [100, 118] },
      { color: "#64B5F6", top: 75, left: 45, rotate: "-6deg", z: 8, string: [68, 133] },
      { color: "#E57373", top: 75, left: 110, rotate: "6deg", z: 8, string: [133, 133] },
      { color: "#4DB6AC", top: 85, left: 15, rotate: "-12deg", z: 9, string: [38, 143] },
      { color: "#BA68C8", top: 85, left: 140, rotate: "12deg", z: 9, string: [163, 143] },
      { color: "#FFD54F", top: 100, left: 65, rotate: "-4deg", z: 10, string: [88, 158] },
      { color: "#F06292", top: 100, left: 90, rotate: "4deg", z: 10, string: [113, 158] },
      { color: "#FF8A65", top: 110, left: 35, rotate: "-10deg", z: 11, string: [58, 168] },
      { color: "#4FC3F7", top: 110, left: 120, rotate: "10deg", z: 11, string: [143, 168] }
    ];

    const flightPath = document.getElementById("flightPath");
    const skyCanvas = document.querySelector(".sky-canvas");
    const cloudField = document.getElementById("cloudField");
    const cluster = document.getElementById("balloonCluster");
    const stringsSvg = document.getElementById("stringsSvg");
    const character = document.getElementById("character");
    const stringKnot = document.getElementById("stringKnot");
    const blackout = document.getElementById("blackout");
    const sceneTwo = document.getElementById("sceneTwo");
    const runner = document.getElementById("runner");
    const runnerSprite = document.getElementById("runnerSprite");
    const bobbingContainer = document.querySelector(".bobbing-container");

    const activeClouds = new Set();

    let blackoutStarted = false;
    let cloudIntervalId = null;
    let runnerFrame = 0;
    let runnerFrameTimer = null;

    function randomBetween(min, max) {
      return Math.random() * (max - min) + min;
    }

    function startSceneOne() {
      window.setTimeout(() => {
        flightPath.classList.add("is-rising");
      }, SCENE_ONE_START_DELAY);
    }

    function createCloud(isInitial = false) {
      const wrapper = document.createElement("div");
      const cloud = document.createElement("div");

      const top = randomBetween(3, 30);
      const scale = randomBetween(0.5, 1.2);
      const duration = randomBetween(70, 130);
      const delay = isInitial ? randomBetween(-duration, 0) : 0;
      const z = Math.random() < 0.55 ? 1 : 15;
      const opacity = z === 15 ? randomBetween(0.96, 1) : randomBetween(0.85, 0.95);

      wrapper.className = "cloud-wrapper";
      wrapper.style.setProperty("--top", `${top.toFixed(1)}%`);
      wrapper.style.setProperty("--scale", scale.toFixed(2));
      wrapper.style.setProperty("--dur", `${duration.toFixed(1)}s`);
      wrapper.style.setProperty("--delay", `${delay.toFixed(1)}s`);
      wrapper.style.setProperty("--op", opacity.toFixed(2));
      wrapper.style.setProperty("--z", z);

      cloud.className = "cloud";
      wrapper.appendChild(cloud);
      activeClouds.add(wrapper);

      const replaceCloud = () => {
        if (!activeClouds.has(wrapper)) return;

        activeClouds.delete(wrapper);
        wrapper.remove();
        keepCloudsAlive();
      };

      wrapper.addEventListener("animationend", replaceCloud, { once: true });

      const visibleLife = Math.max(1200, (duration + Math.min(delay, 0)) * 1000 + 1200);
      window.setTimeout(replaceCloud, visibleLife);

      return wrapper;
    }

    function keepCloudsAlive() {
      if (skyCanvas.classList.contains("is-next-scene")) return;

      [...activeClouds].forEach((cloud) => {
        if (!cloud.isConnected) activeClouds.delete(cloud);
      });

      while (activeClouds.size < CLOUD_COUNT) {
        cloudField.appendChild(createCloud(false));
      }
    }

    function startClouds() {
      cloudField.innerHTML = "";
      activeClouds.clear();

      const fragment = document.createDocumentFragment();

      for (let i = 0; i < CLOUD_COUNT; i++) {
        fragment.appendChild(createCloud(true));
      }

      cloudField.appendChild(fragment);
      cloudIntervalId = window.setInterval(keepCloudsAlive, 3000);
    }

    function stopClouds() {
      if (cloudIntervalId) {
        window.clearInterval(cloudIntervalId);
        cloudIntervalId = null;
      }

      activeClouds.clear();
      cloudField.innerHTML = "";
    }

    function createBalloon(balloon, index) {
      const id = `p${index + 1}`;

      const input = document.createElement("input");
      input.type = "checkbox";
      input.id = id;
      input.className = "balloon-input";

      const label = document.createElement("label");
      label.htmlFor = id;
      label.className = "balloon";
      label.style.setProperty("--c", balloon.color);
      label.style.setProperty("--r", balloon.rotate);
      label.style.top = `${balloon.top}px`;
      label.style.left = `${balloon.left}px`;
      label.style.zIndex = 40 + balloon.z;
      label.setAttribute("aria-label", `Pinchar globo ${index + 1}`);

      const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
      line.setAttribute("x1", balloon.string[0]);
      line.setAttribute("y1", balloon.string[1]);
      line.setAttribute("x2", "100");
      line.setAttribute("y2", "230");

      input.addEventListener("change", () => {
        if (!input.checked) return;

        label.classList.add("is-popped");
        line.classList.add("is-hidden");
        updateCharacter();
      });

      cluster.insertBefore(input, stringsSvg);
      cluster.appendChild(label);
      stringsSvg.appendChild(line);
    }

    function startBalloons() {
      balloons.forEach(createBalloon);
    }

    function setCharacterMood(moodIndex) {
      character.src = characterStates[moodIndex];
      character.classList.toggle("is-worried-1", moodIndex === 1);
      character.classList.toggle("is-worried-2", moodIndex === 2);
      character.classList.toggle("is-panic", moodIndex === 3);
      character.classList.toggle("is-falling", moodIndex === 4);
    }

    function getMoodIndex(poppedCount) {
      if (poppedCount >= 15) return 3;
      if (poppedCount >= 10) return 2;
      if (poppedCount >= 5) return 1;
      return 0;
    }

    function updateCharacter() {
      const poppedCount = document.querySelectorAll(".balloon-input:checked").length;
      const allBalloonsPopped = poppedCount === balloons.length;
      const moodIndex = allBalloonsPopped ? 4 : getMoodIndex(poppedCount);

      if (allBalloonsPopped) {
        bobbingContainer.style.animation = "none";
      }

      setCharacterMood(moodIndex);

      if (allBalloonsPopped) {
        stringKnot.classList.add("is-hidden");
        startBlackout();
      }
    }

    function setRunnerFrame(frameIndex) {
      const column = frameIndex % RUNNER_COLUMNS;
      const row = Math.floor(frameIndex / RUNNER_COLUMNS);
      const x = column * (100 / (RUNNER_COLUMNS - 1));
      const y = row * (100 / (RUNNER_COLUMNS - 1));

      runnerSprite.style.backgroundPosition = `${x}% ${y}%`;
    }

    function startRunnerSprite() {
      if (runnerFrameTimer) return;

      runnerFrameTimer = window.setInterval(() => {
        runnerFrame = (runnerFrame + 1) % RUNNER_FRAME_COUNT;
        setRunnerFrame(runnerFrame);
      }, RUNNER_FRAME_DURATION);
    }

    function clearRunnerRouteClasses() {
      runner.classList.remove(
        "run-left-to-right",
        "run-right-to-left",
        "is-left",
        "is-near",
        "is-far"
      );
    }

    function startRunnerRoute(route) {
      clearRunnerRouteClasses();

      if (route === "near") {
        runner.classList.add("is-near", "run-left-to-right");
        return;
      }

      runner.classList.add("is-left", "is-far", "run-right-to-left");
    }

    function startRunner() {
      startRunnerSprite();
      startRunnerRoute("near");
    }

    runner.addEventListener("animationend", (event) => {
      if (event.animationName !== "runLeftToRight" && event.animationName !== "runRightToLeft") {
        return;
      }

      runnerLaps++;

      if (runnerLaps >= 1 && !treeCharacterShown) {
        treeCharacterShown = true;
        treeCharacter.classList.add("is-visible");
      }

      if (runnerLaps >= 2 && !thoughtBubbleShown) {
        thoughtBubbleShown = true;
        thoughtBubble.classList.add("is-visible");
        setupThoughtBubbleInteraction();
      }

      if (event.animationName === "runLeftToRight") {
        startRunnerRoute("far");
      }

      if (event.animationName === "runRightToLeft") {
        startRunnerRoute("near");
      }
    });

    // Configura la interacción táctil y clic sobre la nube de pensamientos en Escena Dos
    function setupThoughtBubbleInteraction() {
      thoughtBubble.onclick = null;
      thoughtBubble.onclick = (e) => {
        // Bloquear múltiples clics
        thoughtBubble.onclick = null;

        // Disparar las explosiones orgánicas de humo y corazones
        createSmokeBurst(e);
        createHeartBurst(e);

        // Añadir clase de animación de pincharse (punzadura de la nube / desvanecimiento smoke)
        thoughtBubble.classList.add("is-popped");

        // Iniciar el blackout con la frase romántica de transición recreando el mismo comportamiento unificado
        window.setTimeout(() => {
          playBlackoutTransition("Ella te eligió a ti, me tocaba a mi hacerlo...", () => {
            // Detener el runner y ocultar Escena Dos
            if (runnerFrameTimer) {
              window.clearInterval(runnerFrameTimer);
              runnerFrameTimer = null;
            }
            sceneTwo.classList.remove("is-active");
            sceneTwo.setAttribute("aria-hidden", "true");

            // Mostrar y preparar Escena Tres
            const sceneThree = document.getElementById("sceneThree");
            if (sceneThree) {
              sceneThree.classList.add("is-active");
              sceneThree.setAttribute("aria-hidden", "false");
            }
          });
        }, 650); // Permitir que la animación de "pincharse" se aprecie antes de tapar con blackout
      };
    }

    // Genera partículas de humo orgánico simulando dispersión gaseosa
    function createSmokeBurst(e) {
      const rect = thoughtBubble.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height * 0.45;

      for (let i = 0; i < 18; i++) {
        const particle = document.createElement("div");
        particle.className = "smoke-particle";
        
        const offsetAngle = Math.random() * Math.PI * 2;
        const offsetDist = randomBetween(0, 65);
        const startX = cx + Math.cos(offsetAngle) * offsetDist;
        const startY = cy + Math.sin(offsetAngle) * offsetDist;

        particle.style.left = `${startX}px`;
        particle.style.top = `${startY}px`;

        const travelAngle = randomBetween(-Math.PI * 0.8, -Math.PI * 0.2); 
        const travelDist = randomBetween(70, 200);
        const tx = Math.cos(travelAngle) * travelDist;
        const ty = Math.sin(travelAngle) * travelDist - randomBetween(30, 80); 

        const scaleEnd = randomBetween(1.6, 3.4);
        const rotEnd = randomBetween(-100, 100);
        const duration = randomBetween(1.1, 1.8);
        const maxOpacity = randomBetween(0.45, 0.75);
        const size = randomBetween(45, 90);

        particle.style.width = `${size}px`;
        particle.style.height = `${size}px`;

        particle.style.setProperty("--tx", `${tx}px`);
        particle.style.setProperty("--ty", `${ty}px`);
        particle.style.setProperty("--scale-end", scaleEnd);
        particle.style.setProperty("--rot-end", `${rotEnd}deg`);
        particle.style.setProperty("--duration", `${duration}s`);
        particle.style.setProperty("--max-opacity", maxOpacity);

        document.body.appendChild(particle);

        particle.addEventListener("animationend", () => {
          particle.remove();
        }, { once: true });
      }
    }

    // Genera partículas en cascada de corazones de colores flotantes
    function createHeartBurst(e) {
      const rect = thoughtBubble.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 3.2;

      for (let i = 0; i < 22; i++) {
        const particle = document.createElement("div");
        particle.className = "heart-particle";
        particle.style.left = `${cx}px`;
        particle.style.top = `${cy}px`;
        
        const angle = randomBetween(0, Math.PI * 2);
        const dist = randomBetween(45, 175);
        const tx = Math.cos(angle) * dist;
        const ty = Math.sin(angle) * dist - 70; // Deriva hacia arriba de forma natural
        
        const rotStart = randomBetween(-25, 25);
        const rotEnd = randomBetween(-180, 180);
        const scaleMax = randomBetween(0.75, 1.35);

        particle.style.setProperty("--tx", `${tx}px`);
        particle.style.setProperty("--ty", `${ty}px`);
        particle.style.setProperty("--rot-start", `${rotStart}deg`);
        particle.style.setProperty("--rot-end", `${rotEnd}deg`);
        particle.style.setProperty("--scale-max", scaleMax);

        // Paleta pastel y cálida para los corazones
        const colors = ["#ff4f8b", "#ff758f", "#ff8fa3", "#ffa6c9", "#fbcfdf", "#ffebd9"];
        particle.innerHTML = "❤";
        particle.style.color = colors[Math.floor(Math.random() * colors.length)];
        
        document.body.appendChild(particle);
        particle.addEventListener("animationend", () => particle.remove(), { once: true });
      }
    }

    // Reinicia la experiencia para volver al dulce inicio utilizando el sistema blackout unificado
    function resetExperience() {
      // Ocultar botón de reinicio antes del fundido
      const resetBtn = document.getElementById("blackoutResetBtn");
      if (resetBtn) {
        resetBtn.style.opacity = "0";
        resetBtn.style.pointerEvents = "none";
      }

      playBlackoutTransition("Regresando al dulce inicio...", () => {
        // Reajustar todas las variables clave del runner de Escena Dos
        runnerLaps = 0;
        treeCharacterShown = false;
        thoughtBubbleShown = false;
        treeCharacter.classList.remove("is-visible");
        thoughtBubble.classList.remove("is-visible");
        thoughtBubble.classList.remove("is-popped");
        thoughtBubble.onclick = null;
        stringKnot.classList.remove("is-hidden");

        // Limpiar Escena Tres
        const sceneThree = document.getElementById("sceneThree");
        if (sceneThree) {
          sceneThree.classList.remove("is-active");
          sceneThree.setAttribute("aria-hidden", "true");
        }

        if (runnerFrameTimer) {
          window.clearInterval(runnerFrameTimer);
          runnerFrameTimer = null;
        }

        // Reajustar globos táctiles de la Escena Uno
        document.querySelectorAll(".balloon-input").forEach((input) => {
          input.checked = false;
        });
        document.querySelectorAll(".balloon").forEach((b) => {
          b.classList.remove("is-popped");
        });
        document.querySelectorAll(".strings-svg line").forEach((l) => {
          l.classList.remove("is-hidden");
        });

        bobbingContainer.style.animation = "";
        setCharacterMood(0);

        // Regresar la lona del cielo general a escena uno
        skyCanvas.classList.remove("is-next-scene");

        // Volver a disparar el renderizado básico
        startClouds();
        startBalloons();
        startSceneOne();
      });
    }

    // Función reutilizable unificada de transición de blackout para todas las transiciones
    function playBlackoutTransition(message, onMidwayCallback) {
      if (blackoutStarted) return;
      blackoutStarted = true;

      const messageEl = blackout.querySelector(".blackout-message");
      messageEl.textContent = message;

      // Asegurar el reset de cualquier estilo inline o clases pasadas
      blackout.removeAttribute("style");
      blackout.classList.remove("is-leaving");
      blackout.classList.add("is-active");

      // El blackout (fadeToBlack) tarda 1.8 segundos en inundar la pantalla de negro.
      // Sumamos la permanencia del mensaje en pantalla; a los 3000ms el fondo se cambia
      window.setTimeout(() => {
        if (onMidwayCallback) {
          onMidwayCallback();
        }

        // Delay de 300ms idéntico al original antes de comenzar la transición de salida
        window.setTimeout(() => {
          blackout.classList.remove("is-active");
          blackout.classList.add("is-leaving");

          window.setTimeout(() => {
            blackout.classList.remove("is-leaving");
            blackoutStarted = false; // Permitir que se puedan accionar más transiciones en adelante
          }, 1800);
        }, 300);

      }, 3000);
    }

    function startBlackout() {
      // Retrasar el lanzamiento del primer blackout como en el original (2600ms tras caída)
      window.setTimeout(() => {
        playBlackoutTransition("Y entonces empezó nuestra historia...", loadNextScene);
      }, 2600);
    }

    function loadNextScene() {
      stopClouds();
      skyCanvas.classList.add("is-next-scene");
      sceneTwo.classList.add("is-active");
      sceneTwo.setAttribute("aria-hidden", "false");
      startRunner();
    }

    function loadImage(src) {
      return new Promise((resolve) => {
        const image = new Image();

        image.onload = () => resolve({ src, ok: true });
        image.onerror = () => resolve({ src, ok: false });

        image.src = src;
      });
    }

    async function loadAssets(srcList) {
      const loaderPercent = document.getElementById("loaderPercent");
      let loaded = 0;

      const promises = srcList.map(async (src) => {
        const result = await loadImage(src);
        loaded++;

        const percent = Math.round((loaded / srcList.length) * 100);
        loaderPercent.textContent = `${percent}%`;

        return result;
      });

      return Promise.all(promises);
    }

    function hideLoader() {
      const loader = document.getElementById("loader");
      loader.classList.add("is-hidden");
    }

    async function init() {
      await loadAssets(assetsToLoad);

      hideLoader();

      character.src = characterStates[0];
      setRunnerFrame(0);

      startClouds();
      startBalloons();
      startSceneOne();

      document.addEventListener("visibilitychange", () => {
        if (!document.hidden) keepCloudsAlive();
      });
    }

    init();
  </script>
</body>

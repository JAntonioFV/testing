<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>test</title>

  <style>
    @font-face {
      font-family: "FuenteRomantica";
      src: url("fonts/fuente_inicio.ttf") format("truetype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --sky-top: #aee2ff;
      --sky-bottom: #e1f5fe;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #e3f2fd;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .sky-canvas {
      position: absolute;
      inset: 0;
      overflow: hidden;
      isolation: isolate;
      background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-bottom) 100%);
      transition: none;
    }

    .sky-canvas.is-next-scene {
      background: #000;
    }

    .scene-one {
      transition: none;
    }

    .sky-canvas.is-next-scene .scene-one {
      opacity: 0;
      filter: blur(10px);
      pointer-events: none;
    }

    .sun {
      position: absolute;
      top: 8%;
      right: 10%;
      width: clamp(85px, 10vw, 125px);
      height: clamp(85px, 10vw, 125px);
      border-radius: 50%;
      z-index: 2;
      background: radial-gradient(circle at 35% 32%, #fffdf2 0 18%, #fff4d2 42%, #ffd98f 100%);
      box-shadow:
        0 0 45px 18px rgba(255, 244, 210, 0.38),
        0 0 95px 42px rgba(255, 214, 125, 0.22),
        0 0 150px 70px rgba(255, 244, 210, 0.14);
      animation: sunPulse 6s ease-in-out infinite;
      will-change: transform, box-shadow;
      pointer-events: none;
    }

    @keyframes sunPulse {
      0%, 100% {
        transform: scale(1);
        box-shadow:
          0 0 45px 18px rgba(255, 244, 210, 0.38),
          0 0 95px 42px rgba(255, 214, 125, 0.22),
          0 0 150px 70px rgba(255, 244, 210, 0.14);
      }

      50% {
        transform: scale(1.04);
        box-shadow:
          0 0 58px 24px rgba(255, 244, 210, 0.48),
          0 0 118px 52px rgba(255, 214, 125, 0.3),
          0 0 180px 82px rgba(255, 244, 210, 0.2);
      }
    }

    .cloud-field {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .cloud-wrapper {
      position: absolute;
      left: -360px;
      top: var(--top);
      z-index: var(--z);
      opacity: var(--op);
      animation: drift var(--dur) linear var(--delay) 1 forwards;
      will-change: transform;
      pointer-events: none;
    }

    .cloud {
      position: relative;
      width: 120px;
      height: 40px;
      border-radius: 50px;
      background: #fff;
      transform: scale(var(--scale));
    }

    .cloud::before,
    .cloud::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      background: #fff;
    }

    .cloud::before {
      width: 60px;
      height: 60px;
      top: -25px;
      left: 15px;
    }

    .cloud::after {
      width: 40px;
      height: 40px;
      top: -15px;
      right: 15px;
    }

    @keyframes drift {
      from { transform: translate3d(-180px, 0, 0); }
      to { transform: translate3d(calc(100vw + 820px), 0, 0); }
    }

    .city-scene {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .city-layer {
      position: absolute;
      left: 50%;
      bottom: 0;
      width: min(112vw, 1500px);
      height: auto;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .city-back {
      z-index: 10;
      opacity: 0.92;
      transform: translateX(-50%) translate(0px, 10px) scale(1.04);
    }

    .flight-path {
      position: absolute;
      left: 50%;
      top: 50%;
      z-index: 20;
      transform: translate3d(-50%, calc(50vh + 220px), 0);
      will-change: transform;
    }

    .flight-path.is-rising {
      animation: riseUp 8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
    }

    .bobbing-container {
      position: relative;
      animation: floatBob 4s ease-in-out infinite;
      will-change: transform;
    }

    .balloon-cluster {
      position: relative;
      width: 200px;
      height: 250px;
      transform: translateY(-10px) scale(0.85);
      transform-origin: center center;
    }

    @keyframes riseUp {
      from { transform: translate3d(-50%, calc(50vh + 220px), 0); }
      to { transform: translate3d(-50%, -50%, 0); }
    }

    @keyframes floatBob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    .character {
      position: absolute;
      left: 52%;
      top: 220px;
      width: 120px;
      z-index: 50;
      display: block;
      transform: translateX(-50%);
      transform-origin: top center;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
      transition: transform 0.4s ease, opacity 0.3s ease;
    }

    .character:not(.is-falling) {
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.18));
    }

    .character.is-worried-1 {
      transform: translateX(-50%) rotate(0.5deg);
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.18)) saturate(0.9);
    }

    .character.is-worried-2 {
      transform: translateX(-50%) rotate(-0.8deg);
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.18)) saturate(0.8) contrast(1.04);
    }

    .character.is-panic {
      transform: translateX(-50%) rotate(-1deg);
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.18)) saturate(0.7) contrast(1.08);
    }

    .character.is-falling {
      width: 120px;
      filter: none;
      transition: none;
      animation: characterFall 3.2s cubic-bezier(0.35, 0, 0.85, 0.35) forwards;
      will-change: transform;
    }

    @keyframes characterFall {
      0% {
        transform: translateX(-50%) translateY(0) rotate(-6deg);
        opacity: 1;
      }

      100% {
        transform: translateX(-50%) translateY(95vh) rotate(12deg);
        opacity: 0.95;
      }
    }

    .balloon-input {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .balloon {
      position: absolute;
      width: 45px;
      height: 60px;
      border-radius: 50% 50% 50% 50% / 45% 45% 55% 55%;
      background: var(--c);
      box-shadow:
        inset -4px -4px 12px rgba(0, 0, 0, 0.15),
        inset 2px 2px 5px rgba(255, 255, 255, 0.3);
      transform: rotate(var(--r));
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      will-change: transform, opacity, filter;
    }

    .balloon:active {
      filter: brightness(1.2);
    }

    .balloon::before {
      content: "";
      position: absolute;
      bottom: -5px;
      left: 50%;
      width: 0;
      height: 0;
      transform: translateX(-50%);
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-bottom: 8px solid var(--c);
      pointer-events: none;
    }

    .balloon::after {
      content: "";
      position: absolute;
      top: 8px;
      left: 10px;
      width: 10px;
      height: 18px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.5);
      transform: rotate(20deg);
      pointer-events: none;
    }

    .balloon.is-popped {
      animation: popEffect 0.2s forwards;
      pointer-events: none;
    }

    @keyframes popEffect {
      0% {
        transform: scale(1) rotate(var(--r));
        opacity: 1;
        filter: brightness(1);
      }

      50% {
        transform: scale(1.3) rotate(var(--r));
        opacity: 0.8;
        filter: brightness(1.5);
      }

      100% {
        transform: scale(0) rotate(var(--r));
        opacity: 0;
      }
    }

    .strings-svg {
      position: absolute;
      inset: 0 auto auto 0;
      z-index: 30;
      pointer-events: none;
    }

    .strings-svg line {
      stroke: rgba(255, 255, 255, 0.7);
      stroke-width: 1.5;
      transition: opacity 0.2s ease-out;
    }

    .strings-svg line.is-hidden {
      opacity: 0;
    }

    .string-knot {
      position: absolute;
      top: 227px;
      left: 97px;
      width: 6px;
      height: 6px;
      z-index: 35;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.9);
      transition: opacity 0.2s;
      pointer-events: none;
    }

    .string-knot.is-hidden {
      opacity: 0;
    }

    .blackout {
      position: absolute;
      inset: 0;
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
      background: #000;
      opacity: 0;
      pointer-events: none;
    }

    .blackout.is-active {
      animation: fadeToBlack 1.8s ease-in-out forwards;
    }

    .blackout.is-leaving {
      animation: fadeFromBlack 1.8s ease-in-out forwards;
    }

    .blackout-message {
      max-width: min(86vw, 760px);
      color: rgba(255, 255, 255, 0.94);
      font-family: "FuenteRomantica", cursive;
      font-size: clamp(2.2rem, 9vw, 5.8rem);
      line-height: 1.05;
      text-align: center;
      letter-spacing: 0;
      opacity: 0;
      transform: translateY(18px) scale(0.96);
      text-shadow:
        0 0 18px rgba(255, 255, 255, 0.28),
        0 0 36px rgba(255, 210, 230, 0.18);
    }

    .blackout.is-active .blackout-message {
      animation: messageReveal 1.7s ease forwards 1.35s;
    }

    .blackout.is-leaving .blackout-message {
      animation: messageHide 1.2s ease forwards;
    }

    @keyframes fadeToBlack {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes fadeFromBlack {
      from { opacity: 1; }
      to { opacity: 0; }
    }

    @keyframes messageReveal {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes messageHide {
      from {
        opacity: 1;
        transform: translateY(0) scale(1);
      }

      to {
        opacity: 0;
        transform: translateY(-18px) scale(0.96);
      }
    }

    .scene-two {
      position: absolute;
      inset: 0;
      z-index: 1;
      opacity: 0;
      pointer-events: none;
      background: #000;
    }

    .scene-two.is-active {
      opacity: 1;
      pointer-events: auto;
    }

    .scene-two-bg {
      position: absolute;
      inset: 0;
      z-index: 1;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    .scene-two-tree-front {
      position: absolute;
      right: -3vw;
      bottom: 0;
      height: 112vh;
      width: auto;
      z-index: 20;
      filter: brightness(0.88) saturate(0.95);
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .runner {
      position: absolute;
      left: 0;
      top: 66%;
      z-index: 10;
      width: clamp(220px, 42vw, 500px);
      aspect-ratio: 1 / 1;
      transform: translate(-150%, -50%);
      pointer-events: none;
      will-change: transform;
    }

    .runner-sprite {
      width: 100%;
      height: 100%;
      background-image: url("img/novia-run-sprite.png");
      background-repeat: no-repeat;
      background-size: 700% 700%;
      background-position: 0% 0%;
      image-rendering: auto;
    }

    .runner.is-left .runner-sprite {
      transform: scaleX(-1);
    }

    .runner.is-near {
      z-index: 12;
    }

    .runner.is-far {
      z-index: 8;
      filter: brightness(0.92) saturate(0.9);
    }

    .runner.run-left-to-right {
      animation: runLeftToRight 6.5s linear forwards;
    }

    .runner.run-right-to-left {
      animation: runRightToLeft 7.4s linear forwards;
    }

    @keyframes runLeftToRight {
      from {
        top: 78%;
        transform: translate(-150%, -50%) scale(1.2);
      }

      to {
        top: 78%;
        transform: translate(115vw, -50%) scale(1.2);
      }
    }

    @keyframes runRightToLeft {
      from {
        top: 46%;
        transform: translate(115vw, -50%) scale(0.5);
      }

      to {
        top: 46%;
        transform: translate(-150%, -50%) scale(0.5);
      }
    }

    .tree-character {
      position: absolute;
      right: -90vw;
      bottom: -20vh;
      z-index: 30;
      width: clamp(800px, 100vw, 1060px);
      opacity: 0;
      transform: translateX(28px) scale(0.96);
      transition:
        opacity 0.9s ease,
        transform 0.9s ease;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .tree-character.is-visible {
      opacity: 1;
      transform: translateX(0) scale(1);
    }

    .thought-bubble {
      position: absolute;
      left: 50%;
      bottom: 39vh;
      z-index: 35;
      width: clamp(285px, 46vw, 520px);
      aspect-ratio: 1.58 / 1;
      opacity: 0;
      transform: translate(-50%, 16px) scale(0.82);
      transition:
        opacity 0.55s ease,
        transform 0.72s cubic-bezier(0.2, 1.35, 0.4, 1);
      pointer-events: none;
      user-select: none;
      filter: drop-shadow(0 5px 7px rgba(0, 0, 0, 0.14));
    }

    .thought-bubble.is-visible {
      opacity: 1;
      transform: translate(-50%, 0) scale(1);
      animation: thoughtFloat 3.2s ease-in-out infinite 0.8s;
    }

    .thought-cloud-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .thought-cloud-fill {
      fill: #fff;
    }

    .thought-cloud-line {
      fill: none;
      stroke: #111;
      stroke-width: 7;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .thought-puff {
      position: absolute;
      background: #fff;
      border: 4px solid #111;
      z-index: 2;
      box-shadow: 1px 1px 0 rgba(0, 0, 0, 0.18);
    }

    .thought-puff-one {
      width: clamp(30px, 4.5vw, 48px);
      height: clamp(23px, 3.7vw, 38px);
      right: 18%;
      bottom: -3%;
      border-radius: 58% 42% 52% 48% / 48% 58% 42% 52%;
      transform: rotate(4deg);
    }

    .thought-puff-two {
      width: clamp(22px, 3.4vw, 36px);
      height: clamp(18px, 2.8vw, 29px);
      right: 12.5%;
      bottom: -9%;
      border-radius: 46% 54% 58% 42% / 56% 44% 50% 50%;
      transform: rotate(-8deg);
    }

    .thought-puff-three {
      width: clamp(13px, 2.2vw, 22px);
      height: clamp(10px, 1.7vw, 18px);
      right: 8.5%;
      bottom: -50%;
      border-radius: 55% 45% 50% 50% / 44% 58% 42% 56%;
      transform: rotate(9deg);
    }

    .thought-story {
      position: absolute;
      left: 16%;
      top: 22%;
      z-index: 3;
      width: 68%;
      height: 54%;
      opacity: 0;
      transform: scale(0.96);
      transition:
        opacity 0.45s ease,
        transform 0.45s ease;
    }

    .thought-bubble.is-visible .thought-story {
      opacity: 1;
      transform: scale(1);
    }

    .stick-story {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .stick-story line,
    .stick-story path,
    .stick-story circle {
      fill: none;
      stroke: #111;
      stroke-width: 5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .story-ground line {
      stroke-width: 3.2;
      opacity: 0.45;
    }

    .story-scene {
      opacity: 0;
      transform-box: fill-box;
      transform-origin: center;
    }

    .mom-hair,
    .runner-hair,
    .girl-hair,
    .boy-hair {
      stroke-width: 4;
    }

    .kiss-heart,
    .watch-heart {
      fill: #ff5c8a;
      stroke: #111;
      stroke-width: 4;
    }

    .thought-bubble.is-visible .story-scene-couple {
      animation: coupleScene 8s ease-in-out infinite;
    }

    .thought-bubble.is-visible .mini-runner {
      animation: miniRunnerCross 8s ease-in-out infinite;
    }

    .thought-bubble.is-visible .runner-arm-one,
    .thought-bubble.is-visible .runner-leg-two {
      animation: limbSwingA 0.36s ease-in-out infinite alternate;
      transform-origin: 214px 82px;
    }

    .thought-bubble.is-visible .runner-arm-two,
    .thought-bubble.is-visible .runner-leg-one {
      animation: limbSwingB 0.36s ease-in-out infinite alternate;
      transform-origin: 214px 82px;
    }

    .thought-bubble.is-visible .watch-heart {
      animation: watchHeartPop 8s ease-in-out infinite;
      transform-origin: 132px 52px;
    }

    .thought-bubble.is-visible .stick-boy {
      animation: boyApproach 8s ease-in-out infinite;
    }

    .thought-bubble.is-visible .stick-girl {
      animation: girlApproach 8s ease-in-out infinite;
    }

    .thought-bubble.is-visible .kiss-heart {
      animation: kissHeartPop 8s ease-in-out infinite;
      transform-origin: 160px 48px;
    }

    @keyframes watchScene {
      0%, 8% {
        opacity: 0;
        transform: translateY(4px) scale(0.96);
      }

      12%, 43% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }

      50%, 100% {
        opacity: 0;
        transform: translateY(-4px) scale(0.98);
      }
    }

    @keyframes coupleScene {
      0%, 48% {
        opacity: 0;
        transform: translateY(5px) scale(0.96);
      }

      55%, 92% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }

      100% {
        opacity: 0;
        transform: translateY(-4px) scale(0.98);
      }
    }

    @keyframes miniRunnerCross {
      0%, 10% {
        transform: translateX(76px);
        opacity: 0;
      }

      18%, 38% {
        opacity: 1;
      }

      45%, 100% {
        transform: translateX(-96px);
        opacity: 0;
      }
    }

    @keyframes limbSwingA {
      from { transform: rotate(-10deg); }
      to { transform: rotate(12deg); }
    }

    @keyframes limbSwingB {
      from { transform: rotate(12deg); }
      to { transform: rotate(-10deg); }
    }

    @keyframes watchHeartPop {
      0%, 23% {
        opacity: 0;
        transform: scale(0.5) translateY(6px);
      }

      30%, 43% {
        opacity: 1;
        transform: scale(1) translateY(0);
      }

      50%, 100% {
        opacity: 0;
        transform: scale(0.75) translateY(-4px);
      }
    }

    @keyframes boyApproach {
      0%, 52% {
        transform: translateX(-34px);
      }

      70%, 100% {
        transform: translateX(14px);
      }
    }

    @keyframes girlApproach {
      0%, 52% {
        transform: translateX(34px);
      }

      70%, 100% {
        transform: translateX(-14px);
      }
    }

    @keyframes kissHeartPop {
      0%, 65% {
        opacity: 0;
        transform: scale(0.45) translateY(8px);
      }

      74%, 92% {
        opacity: 1;
        transform: scale(1) translateY(0);
      }

      100% {
        opacity: 0;
        transform: scale(0.75) translateY(-5px);
      }
    }

    @keyframes thoughtFloat {
      0%, 100% {
        transform: translate(-50%, 0) scale(1);
      }

      50% {
        transform: translate(-50%, -5px) scale(1.01);
      }
    }

    @media (max-width: 700px) {
      .scene-two-bg {
        object-position: 42% center;
      }

      .scene-two-tree-front {
        right: -65vw;
        height: 105vh;
      }

      .runner {
        width: clamp(180px, 78vw, 360px);
      }

      .thought-bubble {
        left: 50%;
        bottom: 42vh;
        width: clamp(285px, 90vw, 430px);
      }

      .thought-cloud-line {
        stroke-width: 6.5;
      }

      .thought-puff-one {
        right: 17%;
        bottom: -2%;
      }

      .thought-puff-two {
        right: 12%;
        bottom: -8%;
      }

      .thought-puff-three {
        right: 8.3%;
        bottom: -14%;
      }

      .thought-story {
        left: 15%;
        top: 22%;
        width: 70%;
        height: 55%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .sun,
      .cloud-wrapper,
      .bobbing-container,
      .flight-path,
      .balloon.is-popped,
      .character.is-falling,
      .blackout,
      .blackout-message,
      .runner,
      .thought-bubble,
      .story-scene,
      .mini-runner,
      .runner-arm-one,
      .runner-arm-two,
      .runner-leg-one,
      .runner-leg-two,
      .watch-heart,
      .stick-boy,
      .stick-girl,
      .kiss-heart {
        animation: none !important;
      }
    }

    .loader {
      position: fixed;
      inset: 0;
      z-index: 5000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      background: #000;
      color: #fff;
      opacity: 1;
      visibility: visible;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }

    .loader.is-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loader-heart {
      color: #ff4f8b;
      font-size: clamp(3.4rem, 18vw, 8rem);
      line-height: 1;
      text-shadow:
        0 0 18px rgba(255, 79, 139, 0.8),
        0 0 44px rgba(255, 79, 139, 0.35);
      animation: heartBeat 1.1s ease-in-out infinite;
    }

    .loader-percent {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: clamp(1.1rem, 5vw, 2rem);
      font-weight: 600;
      letter-spacing: 0.04em;
      color: rgba(255, 255, 255, 0.88);
    }

    @keyframes heartBeat {
      0%, 100% {
        transform: scale(1);
        filter: brightness(1);
      }

      35% {
        transform: scale(1.18);
        filter: brightness(1.18);
      }

      58% {
        transform: scale(0.96);
      }
    }
  </style>
</head>

<body>
  <div id="loader" class="loader" aria-live="polite">
    <div class="loader-heart" aria-hidden="true">❤</div>
    <div id="loaderPercent" class="loader-percent">0%</div>
  </div>

  <main class="sky-canvas">
    <div class="sun scene-one"></div>
    <div id="cloudField" class="cloud-field scene-one" aria-hidden="true"></div>

    <div class="city-scene scene-one" aria-hidden="true">
      <img class="city-layer city-back" src="img/ciudad-delantera.png" alt="">
    </div>

    <section id="flightPath" class="flight-path scene-one" aria-label="Globos interactivos">
      <div class="bobbing-container">
        <div id="balloonCluster" class="balloon-cluster">
          <svg id="stringsSvg" class="strings-svg" width="200" height="250" aria-hidden="true"></svg>
          <img id="character" class="character" alt="" />
          <div id="stringKnot" class="string-knot"></div>
        </div>
      </div>
    </section>

    <div id="blackout" class="blackout" aria-hidden="true">
      <p class="blackout-message">Y entonces empezó nuestra historia...</p>
    </div>

    <section id="sceneTwo" class="scene-two" aria-hidden="true">
      <img class="scene-two-bg" src="img/escena2-fondo.png" alt="">

      <div id="runner" class="runner" aria-hidden="true">
        <div id="runnerSprite" class="runner-sprite"></div>
      </div>

      <img id="treeCharacter" class="tree-character" src="img/personaje-arbol.png" alt="">

      <div id="thoughtBubble" class="thought-bubble" aria-hidden="true">
        <svg class="thought-cloud-svg" viewBox="0 0 520 330" aria-hidden="true">
          <path
            class="thought-cloud-fill"
            d="M112 225
               C66 224 36 194 42 155
               C47 120 81 96 119 103
               C126 67 162 46 197 55
               C219 28 263 24 291 50
               C318 33 358 42 378 72
               C415 68 450 92 456 127
               C489 136 503 176 481 205
               C498 240 467 276 429 269
               C407 299 362 294 345 264
               C319 294 269 291 250 260
               C219 289 168 275 163 236
               C147 229 130 226 112 225 Z"
          />
          <path
            class="thought-cloud-line"
            d="M113 223
               C65 224 35 194 42 154
               C49 114 85 94 119 103
               C124 67 161 45 198 55
               C220 28 265 24 292 51
               C321 31 359 44 379 73
               C416 68 452 93 456 129
               C489 136 503 178 480 207
               C497 239 466 276 429 268
               C406 299 361 294 345 264
               C318 294 269 291 250 260
               C219 289 168 275 163 236
               C148 229 130 225 113 223"
          />
        </svg>

        <div class="thought-story">
          <svg class="stick-story" viewBox="0 0 320 170" aria-hidden="true">

            <g class="story-scene story-scene-couple">
              <g class="story-ground">
                <line x1="42" y1="137" x2="278" y2="137"></line>
              </g>

              <g class="stick-boy">
                <circle cx="114" cy="61" r="12"></circle>
                <path d="M114 73 L114 108"></path>
                <path d="M114 84 L96 97"></path>
                <path d="M114 84 L131 96"></path>
                <path d="M114 108 L99 130"></path>
                <path d="M114 108 L130 130"></path>
                <path class="boy-hair" d="M105 55 C111 46 123 47 128 57"></path>
              </g>

              <g class="stick-girl">
                <circle cx="206" cy="61" r="12"></circle>
                <path d="M206 73 L206 108"></path>
                <path d="M206 84 L189 96"></path>
                <path d="M206 84 L224 96"></path>
                <path d="M206 108 L190 130"></path>
                <path d="M206 108 L222 130"></path>
                <path class="girl-hair" d="M195 58 C198 42 217 42 222 58 C218 68 200 69 195 58"></path>
              </g>

              <path class="kiss-heart" d="M145 45 C145 36 156 33 161 41 C166 33 177 36 177 45 C177 58 161 67 161 67 C161 67 145 58 145 45 Z"></path>
            </g>
          </svg>
        </div>

        <span class="thought-puff thought-puff-one"></span>
        <span class="thought-puff thought-puff-two"></span>
        <span class="thought-puff thought-puff-three"></span>
      </div>

      <img class="scene-two-tree-front" src="img/escena2-arbol-frente.png" alt="">
    </section>
  </main>

  <script>
    const SCENE_ONE_START_DELAY = 900;
    const CLOUD_COUNT = 25;
    const RUNNER_FRAME_COUNT = 49;
    const RUNNER_COLUMNS = 7;
    const RUNNER_FRAME_DURATION = 60;

    const treeCharacter = document.getElementById("treeCharacter");
    const thoughtBubble = document.getElementById("thoughtBubble");

    let runnerLaps = 0;
    let treeCharacterShown = false;
    let thoughtBubbleShown = false;

    const characterStates = [
      "img/personaje-normal.png",
      "img/personaje-preocupado-1.png",
      "img/personaje-preocupado-2.png",
      "img/personaje-panico.png",
      "img/personaje-cayendo.png"
    ];

    const assetsToLoad = [
      ...characterStates,
      "img/novia-run-sprite.png",
      "img/escena2-fondo.png",
      "img/escena2-arbol-frente.png",
      "img/ciudad-delantera.png",
      "img/personaje-arbol.png"
    ];

    const balloons = [
      { color: "#FF4081", top: 0, left: 77.5, rotate: "0deg", z: 1, string: [100, 58] },
      { color: "#4FC3F7", top: 10, left: 40, rotate: "-5deg", z: 2, string: [63, 68] },
      { color: "#FFD54F", top: 10, left: 115, rotate: "5deg", z: 2, string: [138, 68] },
      { color: "#BA68C8", top: 25, left: 10, rotate: "-10deg", z: 3, string: [33, 83] },
      { color: "#FF8A65", top: 25, left: 145, rotate: "10deg", z: 3, string: [168, 83] },
      { color: "#F06292", top: 35, left: 60, rotate: "-3deg", z: 4, string: [83, 93] },
      { color: "#B5EAD7", top: 35, left: 95, rotate: "3deg", z: 4, string: [118, 93] },
      { color: "#C7CEEA", top: 45, left: 30, rotate: "-8deg", z: 5, string: [53, 103] },
      { color: "#FFF4D2", top: 45, left: 125, rotate: "8deg", z: 5, string: [148, 103] },
      { color: "#FFB7B2", top: 55, left: 0, rotate: "-15deg", z: 6, string: [23, 113] },
      { color: "#E2F0CB", top: 55, left: 155, rotate: "15deg", z: 6, string: [178, 113] },
      { color: "#81C784", top: 60, left: 77.5, rotate: "0deg", z: 7, string: [100, 118] },
      { color: "#64B5F6", top: 75, left: 45, rotate: "-6deg", z: 8, string: [68, 133] },
      { color: "#E57373", top: 75, left: 110, rotate: "6deg", z: 8, string: [133, 133] },
      { color: "#4DB6AC", top: 85, left: 15, rotate: "-12deg", z: 9, string: [38, 143] },
      { color: "#BA68C8", top: 85, left: 140, rotate: "12deg", z: 9, string: [163, 143] },
      { color: "#FFD54F", top: 100, left: 65, rotate: "-4deg", z: 10, string: [88, 158] },
      { color: "#F06292", top: 100, left: 90, rotate: "4deg", z: 10, string: [113, 158] },
      { color: "#FF8A65", top: 110, left: 35, rotate: "-10deg", z: 11, string: [58, 168] },
      { color: "#4FC3F7", top: 110, left: 120, rotate: "10deg", z: 11, string: [143, 168] }
    ];

    const flightPath = document.getElementById("flightPath");
    const skyCanvas = document.querySelector(".sky-canvas");
    const cloudField = document.getElementById("cloudField");
    const cluster = document.getElementById("balloonCluster");
    const stringsSvg = document.getElementById("stringsSvg");
    const character = document.getElementById("character");
    const stringKnot = document.getElementById("stringKnot");
    const blackout = document.getElementById("blackout");
    const sceneTwo = document.getElementById("sceneTwo");
    const runner = document.getElementById("runner");
    const runnerSprite = document.getElementById("runnerSprite");
    const bobbingContainer = document.querySelector(".bobbing-container");

    const activeClouds = new Set();

    let blackoutStarted = false;
    let cloudIntervalId = null;
    let runnerFrame = 0;
    let runnerFrameTimer = null;

    function randomBetween(min, max) {
      return Math.random() * (max - min) + min;
    }

    function startSceneOne() {
      window.setTimeout(() => {
        flightPath.classList.add("is-rising");
      }, SCENE_ONE_START_DELAY);
    }

    function createCloud(isInitial = false) {
      const wrapper = document.createElement("div");
      const cloud = document.createElement("div");

      const top = randomBetween(3, 30);
      const scale = randomBetween(0.5, 1.2);
      const duration = randomBetween(70, 130);
      const delay = isInitial ? randomBetween(-duration, 0) : 0;
      const z = Math.random() < 0.55 ? 1 : 15;
      const opacity = z === 15 ? randomBetween(0.96, 1) : randomBetween(0.85, 0.95);

      wrapper.className = "cloud-wrapper";
      wrapper.style.setProperty("--top", `${top.toFixed(1)}%`);
      wrapper.style.setProperty("--scale", scale.toFixed(2));
      wrapper.style.setProperty("--dur", `${duration.toFixed(1)}s`);
      wrapper.style.setProperty("--delay", `${delay.toFixed(1)}s`);
      wrapper.style.setProperty("--op", opacity.toFixed(2));
      wrapper.style.setProperty("--z", z);

      cloud.className = "cloud";
      wrapper.appendChild(cloud);
      activeClouds.add(wrapper);

      const replaceCloud = () => {
        if (!activeClouds.has(wrapper)) return;

        activeClouds.delete(wrapper);
        wrapper.remove();
        keepCloudsAlive();
      };

      wrapper.addEventListener("animationend", replaceCloud, { once: true });

      const visibleLife = Math.max(1200, (duration + Math.min(delay, 0)) * 1000 + 1200);
      window.setTimeout(replaceCloud, visibleLife);

      return wrapper;
    }

    function keepCloudsAlive() {
      if (skyCanvas.classList.contains("is-next-scene")) return;

      [...activeClouds].forEach((cloud) => {
        if (!cloud.isConnected) activeClouds.delete(cloud);
      });

      while (activeClouds.size < CLOUD_COUNT) {
        cloudField.appendChild(createCloud(false));
      }
    }

    function startClouds() {
      cloudField.innerHTML = "";
      activeClouds.clear();

      const fragment = document.createDocumentFragment();

      for (let i = 0; i < CLOUD_COUNT; i++) {
        fragment.appendChild(createCloud(true));
      }

      cloudField.appendChild(fragment);
      cloudIntervalId = window.setInterval(keepCloudsAlive, 3000);
    }

    function stopClouds() {
      if (cloudIntervalId) {
        window.clearInterval(cloudIntervalId);
        cloudIntervalId = null;
      }

      activeClouds.clear();
      cloudField.innerHTML = "";
    }

    function createBalloon(balloon, index) {
      const id = `p${index + 1}`;

      const input = document.createElement("input");
      input.type = "checkbox";
      input.id = id;
      input.className = "balloon-input";

      const label = document.createElement("label");
      label.htmlFor = id;
      label.className = "balloon";
      label.style.setProperty("--c", balloon.color);
      label.style.setProperty("--r", balloon.rotate);
      label.style.top = `${balloon.top}px`;
      label.style.left = `${balloon.left}px`;
      label.style.zIndex = 40 + balloon.z;
      label.setAttribute("aria-label", `Pinchar globo ${index + 1}`);

      const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
      line.setAttribute("x1", balloon.string[0]);
      line.setAttribute("y1", balloon.string[1]);
      line.setAttribute("x2", "100");
      line.setAttribute("y2", "230");

      input.addEventListener("change", () => {
        if (!input.checked) return;

        label.classList.add("is-popped");
        line.classList.add("is-hidden");
        updateCharacter();
      });

      cluster.insertBefore(input, stringsSvg);
      cluster.appendChild(label);
      stringsSvg.appendChild(line);
    }

    function startBalloons() {
      balloons.forEach(createBalloon);
    }

    function setCharacterMood(moodIndex) {
      character.src = characterStates[moodIndex];
      character.classList.toggle("is-worried-1", moodIndex === 1);
      character.classList.toggle("is-worried-2", moodIndex === 2);
      character.classList.toggle("is-panic", moodIndex === 3);
      character.classList.toggle("is-falling", moodIndex === 4);
    }

    function getMoodIndex(poppedCount) {
      if (poppedCount >= 15) return 3;
      if (poppedCount >= 10) return 2;
      if (poppedCount >= 5) return 1;
      return 0;
    }

    function updateCharacter() {
      const poppedCount = document.querySelectorAll(".balloon-input:checked").length;
      const allBalloonsPopped = poppedCount === balloons.length;
      const moodIndex = allBalloonsPopped ? 4 : getMoodIndex(poppedCount);

      if (allBalloonsPopped) {
        bobbingContainer.style.animation = "none";
      }

      setCharacterMood(moodIndex);

      if (allBalloonsPopped) {
        stringKnot.classList.add("is-hidden");
        startBlackout();
      }
    }

    function setRunnerFrame(frameIndex) {
      const column = frameIndex % RUNNER_COLUMNS;
      const row = Math.floor(frameIndex / RUNNER_COLUMNS);
      const x = column * (100 / (RUNNER_COLUMNS - 1));
      const y = row * (100 / (RUNNER_COLUMNS - 1));

      runnerSprite.style.backgroundPosition = `${x}% ${y}%`;
    }

    function startRunnerSprite() {
      if (runnerFrameTimer) return;

      runnerFrameTimer = window.setInterval(() => {
        runnerFrame = (runnerFrame + 1) % RUNNER_FRAME_COUNT;
        setRunnerFrame(runnerFrame);
      }, RUNNER_FRAME_DURATION);
    }

    function clearRunnerRouteClasses() {
      runner.classList.remove(
        "run-left-to-right",
        "run-right-to-left",
        "is-left",
        "is-near",
        "is-far"
      );
    }

    function startRunnerRoute(route) {
      clearRunnerRouteClasses();

      if (route === "near") {
        runner.classList.add("is-near", "run-left-to-right");
        return;
      }

      runner.classList.add("is-left", "is-far", "run-right-to-left");
    }

    function startRunner() {
      startRunnerSprite();
      startRunnerRoute("near");
    }

    runner.addEventListener("animationend", (event) => {
      if (event.animationName !== "runLeftToRight" && event.animationName !== "runRightToLeft") {
        return;
      }

      runnerLaps++;

      if (runnerLaps >= 1 && !treeCharacterShown) {
        treeCharacterShown = true;
        treeCharacter.classList.add("is-visible");
      }

      if (runnerLaps >= 3 && !thoughtBubbleShown) {
        thoughtBubbleShown = true;
        thoughtBubble.classList.add("is-visible");
      }

      if (event.animationName === "runLeftToRight") {
        startRunnerRoute("far");
      }

      if (event.animationName === "runRightToLeft") {
        startRunnerRoute("near");
      }
    });

    function startBlackout() {
      if (blackoutStarted) return;

      blackoutStarted = true;

      window.setTimeout(() => {
        blackout.classList.add("is-active");

        window.setTimeout(() => {
          endBlackoutAndLoadNextScene();
        }, 3000);
      }, 2600);
    }

    function endBlackoutAndLoadNextScene() {
      loadNextScene();

      window.setTimeout(() => {
        blackout.classList.remove("is-active");
        blackout.classList.add("is-leaving");

        window.setTimeout(() => {
          blackout.classList.remove("is-leaving");
        }, 1800);
      }, 300);
    }

    function loadNextScene() {
      stopClouds();
      skyCanvas.classList.add("is-next-scene");
      sceneTwo.classList.add("is-active");
      sceneTwo.setAttribute("aria-hidden", "false");
      startRunner();
    }

    function loadImage(src) {
      return new Promise((resolve) => {
        const image = new Image();

        image.onload = () => resolve({ src, ok: true });
        image.onerror = () => resolve({ src, ok: false });

        image.src = src;
      });
    }

    async function loadAssets(srcList) {
      const loaderPercent = document.getElementById("loaderPercent");
      let loaded = 0;

      const promises = srcList.map(async (src) => {
        const result = await loadImage(src);
        loaded++;

        const percent = Math.round((loaded / srcList.length) * 100);
        loaderPercent.textContent = `${percent}%`;

        return result;
      });

      return Promise.all(promises);
    }

    function hideLoader() {
      const loader = document.getElementById("loader");
      loader.classList.add("is-hidden");
    }

    async function init() {
      await loadAssets(assetsToLoad);

      hideLoader();

      character.src = characterStates[0];
      setRunnerFrame(0);

      startClouds();
      startBalloons();
      startSceneOne();

      document.addEventListener("visibilitychange", () => {
        if (!document.hidden) keepCloudsAlive();
      });
    }

    init();
  </script>
</body>
</html>
